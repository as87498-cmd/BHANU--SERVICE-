<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhanu Auto Service</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; text-align: center; }
        .page { display: none; padding: 20px; } /* Animations Hata Diye Fast Speed Ke Liye */
        
        /* Full Screen Login */
        #login-page { display: block; height: 100vh; background: linear-gradient(#1a1a1a, #000); }
        .login-container { padding-top: 100px; }
        input { width: 80%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        
        /* Dashboard & Service */
        .logo-img { width: 130px; border: 2px solid #ffcc00; border-radius: 50%; margin-top: 20px; }
        .btn-box { display: flex; flex-direction: column; gap: 12px; align-items: center; margin-top: 20px; }
        .main-btn { width: 90%; padding: 18px; background: #ffcc00; color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* Display Images */
        .showcase { width: 100%; max-width: 450px; border-radius: 15px; margin-top: 15px; border: 2px solid #333; }
        .back-btn { background: #333; color: #fff; padding: 10px 20px; margin-top: 20px; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-page" class="page">
        <div class="login-container">
            <h1 style="color:#ffcc00">BHANU AUTO</h1>
            <p>Enter Details to Start</p>
            <input type="text" id="custName" placeholder="Customer Name" required>
            <input type="number" id="custPhone" placeholder="Mobile Number" required>
            <br><br>
            <button class="main-btn" onclick="handleLogin()">LOGIN NOW</button>
        </div>
    </div>

    <div id="service-page" class="page">
        <img src="logo.png" class="logo-img">
        <h2 style="color:#ffcc00">Main Service Centre</h2>
        <p>Bhanu Auto Parts & Service, Raipur</p>
        <hr style="border:1px solid #333">
        
        <div class="btn-box">
            <button class="main-btn" onclick="openProduct('Battery Brands', 'battery_showcase.png')">🔋 BATTERY</button>
            <button class="main-btn" onclick="openProduct('Engine Oils', 'oil_showcase.png')">🛢️ ENGINE OIL</button>
            <button class="main-btn" onclick="openProduct('Tyre Range', 'tyre_showcase.png')">🛞 TYRE SERVICE</button>
        </div>
    </div>

    <div id="product-page" class="page">
        <h2 id="titleText" style="color:#ffcc00"></h2>
        <img id="displayImg" src="" class="showcase">
        <br>
        <button class="back-btn" onclick="showPage('service-page')">← Back to Menu</button>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            window.scrollTo(0,0);
        }

        function handleLogin() {
            let name = document.getElementById('custName').value;
            let phone = document.getElementById('custPhone').value;

            if(name == "" || phone == "") {
                alert("Please fill details!");
                return;
            }

            // --- DATA SAVING LOGIC (Optional) ---
            // Yahan hum Google Script ka URL daal sakte hain data sheet mein bhejne ke liye.
            
            showPage('service-page');
        }

        function openProduct(title, imgSrc) {
            document.getElementById('titleText').innerText = title;
            document.getElementById('displayImg').src = imgSrc;
            showPage('product-page');
        }
    </script>
</body>
</html>
