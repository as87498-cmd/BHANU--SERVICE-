<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhanu Auto Parts</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #000; color: #fff; text-align: center; margin: 0; }
        .page { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Login Screen */
        #login-screen { display: block; margin-top: 50px; }
        .box { background: #222; padding: 30px; border-radius: 15px; display: inline-block; border: 2px solid #ffcc00; width: 80%; max-width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        
        /* Dashboard Screen */
        .logo-main { width: 150px; margin-bottom: 20px; border-radius: 50%; border: 2px solid #ffcc00; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .menu-btn { background: #ffcc00; color: #000; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }

        /* Image Display Screen */
        .showcase-img { width: 100%; max-width: 400px; border-radius: 10px; margin-top: 20px; box-shadow: 0 0 20px #ffcc00; }
        .back-btn { background: #555; color: white; margin-top: 20px; padding: 10px 20px; border: none; border-radius: 5px; }

        h2 { color: #ffcc00; }
    </style>
</head>
<body>

    <div id="login-screen" class="page">
        <div class="box">
            <h2>Welcome</h2>
            <p>Bhanu Auto Parts & Service</p>
            <input type="text" id="cust-name" placeholder="Apna Naam Likhein">
            <input type="number" id="cust-phone" placeholder="Mobile Number">
            <button class="menu-btn" style="width: 100%;" onclick="goDashboard()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard" class="page">
        <img src="logo.png" class="logo-main" alt="Bhanu Logo">
        <h2>Services</h2>
        <div class="btn-grid">
            <button class="menu-btn" onclick="showProduct('Battery', 'battery_showcase.png')">BATTERY</button>
            <button class="menu-btn" onclick="showProduct('Engine Oil', 'oil_showcase.png')">ENGINE OIL</button>
            <button class="menu-btn" onclick="showProduct('Tyre', 'tyre_showcase.png')">TYRE</button>
            <button class="menu-btn" onclick="showProduct('Service', 'logo.png')">SERVICE</button>
        </div>
    </div>

    <div id="product-view" class="page">
        <h2 id="product-title">Product</h2>
        <img id="product-img" src="" class="showcase-img">
        <br>
        <button class="back-btn" onclick="goDashboard()">Peeche Jayein (Back)</button>
    </div>

    <script>
        function goDashboard() {
            let name = document.getElementById('cust-name').value;
            let phone = document.getElementById('cust-phone').value;

            if(name === "" || phone === "") {
                alert("Bhai, Name aur Number toh daal do!");
                return;
            }

            // Sab page hide karo, dashboard dikhao
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('dashboard').style.display = 'block';
        }

        function showProduct(title, imgSrc) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('product-view').style.display = 'block';
            
            document.getElementById('product-title').innerText = title;
            document.getElementById('product-img').src = imgSrc;
        }
    </script>

</body>
</html>
