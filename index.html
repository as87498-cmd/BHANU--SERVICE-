<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhanu Auto Service</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: white; text-align: center; margin: 0; }
        .page { display: none; padding: 20px; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Styling */
        #login-page { display: block; margin-top: 80px; }
        .login-box { background: #222; padding: 30px; border-radius: 15px; border: 2px solid #ffcc00; display: inline-block; width: 85%; max-width: 320px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }

        /* Service Page (Main Priority) */
        .logo-img { width: 120px; margin-bottom: 10px; border: 2px solid #ffcc00; border-radius: 50%; }
        .service-card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid #ffcc00; }
        
        /* Buttons Styling */
        .btn-container { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .option-btn { width: 90%; max-width: 300px; padding: 15px; background: #ffcc00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Image Display */
        .display-img { width: 100%; max-width: 400px; border-radius: 10px; margin-top: 20px; box-shadow: 0 0 15px #ffcc00; }
        .back-btn { background: #444; color: white; margin-top: 25px; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-page" class="page">
        <div class="login-box">
            <h2 style="color:#ffcc00">Bhanu Auto Parts</h2>
            <p>Login to View Services</p>
            <input type="text" id="u-name" placeholder="Apna Naam">
            <input type="number" id="u-phone" placeholder="Mobile Number">
            <button class="option-btn" onclick="openService()">LOGIN</button>
        </div>
    </div>

    <div id="service-page" class="page">
        <img src="logo.png" class="logo-img">
        <h2 style="color:#ffcc00">Humari Main Services</h2>
        
        <div class="service-card">
            <h3>Full Vehicle Checkup</h3>
            <p>Cleaning, Washing & Engine Tuning</p>
        </div>

        <p>Niche diye gaye options se products dekhein:</p>
        <div class="btn-container">
            <button class="option-btn" onclick="viewProduct('Tyre Specialist', 'tyre_showcase.png')">🛞 TYRE OPTIONS</button>
            <button class="option-btn" onclick="viewProduct('Premium Engine Oil', 'oil_showcase.png')">🛢️ ENGINE OIL</button>
            <button class="option-btn" onclick="viewProduct('Power Batteries', 'battery_showcase.png')">🔋 BATTERY</button>
        </div>
    </div>

    <div id="product-page" class="page">
        <h2 id="p-title" style="color:#ffcc00">Product</h2>
        <img id="p-img" src="" class="display-img">
        <br>
        <button class="back-btn" onclick="openService()">← Back to Service</button>
    </div>

    <script>
        function openService() {
            let n = document.getElementById('u-name').value;
            let p = document.getElementById('u-phone').value;
            if(n == "" || p == "") { alert("Naam aur Number zaruri hai!"); return; }

            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            document.getElementById('service-page').style.display = 'block';
        }

        function viewProduct(title, src) {
            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            document.getElementById('product-page').style.display = 'block';
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = src;
        }
    </script>

</body>
</html>
